<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>applications</title>
<link rel="icon" type="image/png" href="icon.webp">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<link rel="shortcut icon" href="maxtocantona.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="all apps MaxtoCantona. it here.">

<style>
    :root{  
    --bg:#050816;  
    --card:rgba(12,18,40,.78);  
    --text:#f5f7ff;  
    --muted:#a4aed6;  
    --line:rgba(110,231,255,.22);  
    --neon:#00ffd5;  
    --neon2:#a855f7;  
    --success:#10b981;  
    --error:#ef4444;  
    --shadow:0 0 18px rgba(110,231,255,.18), 0 0 36px rgba(168,85,247,.12);  
  } 
  body {
    font-family: sans-serif;
    background:  
      radial-gradient(circle at top left, rgba(110,231,255,.14), transparent 24%),  
      radial-gradient(circle at top right, rgba(168,85,247,.12), transparent 28%),  
      linear-gradient(180deg, #040711 0%, #050816 100%); 
    display: flex;
    flex-direction: column;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
    color: #fff;
    margin: 0;   
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
    width: 100%;
  }
  .app-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: flex-start;
  justify-content: flex-start;
    padding: 0 10px;
    height: 80vh;
    width: 90%;  
    overflow-y: scroll;    
    overflow-x: hidden;
  }
  .app-list::-webkit-scrollbar {
  width: .5vw;
}

.app-list::-webkit-scrollbar-track {
  background: #222;
}

.app-list::-webkit-scrollbar-thumb {
  background: #0ef;
  border-radius: 10px;
}

.app-list::-webkit-scrollbar-thumb:hover {
  background: #fff;
}

  .app-card {   
    background: transparent;
    border-radius: 12px;
    width: 80%;
    height: 100px;
    display: flex;
    flex-direction: row;
    gap: 10px;
    align-items: center;
    padding-left: 5px;
    margin: 5px 0;
  justify-content: flex-start;   
    transition: transform 0.2s, border 0.3s;
  }

  .app-card.focused {
    box-shadow: 0 0 20px 2px #00ffd5;
    border-color: #00ffd5;
  }

  .app-content {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: inherit;
  }

  .app-card img {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    margin-right: 15px;
    object-fit: cover;     
  }

  .app-card .texts {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 5px;
    width: 80%;
    padding: 5px 0;
    height: 80%;    
  }
  .texts .h3 {
    font-size: 20px;
    color: #fff;
  }

  .footer{
    position: fixed;
    bottom: 0;
    text-align:center;
    color:#fff;
    height: 6vh;
    width: 100%;
    border-top: 1px solid #0ef;
}

.footer a{
    display:inline-block;
    margin:1% 2%;
    color:#0ef;
    text-decoration:none;
    font-weight:bold;
}

.footer a:hover{
    text-decoration:underline;
}

.footer p{
    margin-top:1%;
    color:#fff;
    font-size:13px;
}
  .show-page {
  position: fixed;
  width: 50px;
  height: 25px;
  inset: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.show-page span, .left-page span, .search-btn span, .search-box span{
  font-size: 35px;
  
}
.left-page {
  position: fixed;
  height: 100%;
  width: 300px;
  gap: 10px;
  background:  
      radial-gradient(circle at top left, rgba(110,231,255,.14), transparent 24%),  
      radial-gradient(circle at top right, rgba(168,85,247,.12), transparent 28%),  
      linear-gradient(180deg, #040711 0%, #050816 100%);
  left: -304px;
  z-index: 99;
  top: 0;
  transition: .5s;
  display: flex;
  border-right: 2px solid #0ef;
  flex-direction: column;
  align-items: flex-start;
}
.show-vis {
  left: 0;
} 
.itemp {
  margin-top: 5px;
  display: flex;
  flex-direction: row;
  justify-content: center;
  width: 100%;
  border-bottom: 2px solid #0ef;
  gap: 15px;
  align-items: center;
  text-transform: uppercase;
}
  .search-btn {
    position: fixed;
    right: 55px;
    top: 15px;
  }
  .search-btn:active {
    opacity: .5;
  }
  
  .search-div {
    position: fixed;
    width: 100%;
    height: 60px;
    display: flex;
    flex-direction: row;
    justify-content: flex-start;
    align-items: center;
    background: rgba(000,000,000,1);
    border-bottom: 1px solid #0ef;
    top: -80px;
    z-index: 120;
    transition: .3s;
  }
  .search-div.show-search {
    top: 0;
}
  
  .search-box {
    margin: 0 10px;
    display: flex;
    align-items: center;
  justify-content: center;  
  }
  
  .input {
    width: 60%;
    height: 100%;
    inset: 0;    
  }
  .input input {
    height: 100%;
    width: 100%;
    border: none;
    outline: none;
    font-size: 25px;
    background: transparent;
    color: #fff;           
  }
  .input input::placeholder {
    color: #fff;
  }
  .plus {
    position: absolute;
    right: 30px;
    font-size: 45px;
  }

  
</style>
</head>

<body>
  <div class="search-div">
    
    <div class="search-box">
      <span class="material-symbols-outlined">
search
</span>
    </div>
     <div class="input">
      <input class="search-input" type="text" placeholder="Search"/>
    </div>
     <div class="plus"> ×       
    </div>
    
    
  </div>
  
  
  <div class="search-btn">
    <span class="material-symbols-outlined">
search
</span>
  </div>
  <h2>APPLICATIONS</h2>
  <div class="app-list" id="app-list"></div>  
  

  <div class="footer">
    <a href="about.html?mode=about">About</a>
    <a href="about.html?mode=contact">Contact</a>
    <a href="about.html?mode=services">Services</a>

    <p>© 2026 maxaoma all rights reserved</p>
</div>

  <script type="module">
  let response = await fetch("apps.json");
let data = await response.json();
  let apps = data.apps;
    
    

    const container = document.getElementById("app-list");
    const urlParams = new URLSearchParams(window.location.search);
    let focusedAppId = urlParams.get('focus') || null;
  function render(ap=apps) {
    container.innerHTML = "";
    if(ap.length >= 1) {      

    ap.forEach(function (appItem, i) {
for(let j = 0; j < 13; j++) {      
      
      const href = `download.html?id=${i}`;

      const div = document.createElement("div");
      div.className = "app-card";
      div.innerHTML = `        
          <img src="${appItem.id}.webp" alt="${appItem.name}" onerror="this.src='default-icon.png'">
          <div class="texts">
            <div class="h3">${appItem.name}</div>
             <div>${appItem.description.split(" ").slice(0, 8).join(" ")} ....</div>
          </div>        
      `;
      container.appendChild(div);
      

      div.addEventListener("click", function (e) {
        e.preventDefault();
      
          div.scrollIntoView({ behavior: "smooth", block: "center" });

          const newUrl = window.location.pathname + '?focus=' + encodeURIComponent(appItem.id);
          history.replaceState(null, '', newUrl);
          
          window.location.href = href;   
        
        
      });     
}  
    });
  }    
    else {
      container.innerHTML = `
      <p>NO APPLICATIONS.</p>
      `;
    }
  }
  function sorts(a) {
    let text = a.toLowerCase().trim();
  let cleanApps = [...apps.filter(a => a.name.toLowerCase().startsWith(text) || a.name.toLowerCase().includes(text))];
    render(cleanApps);
  }
    
  document.querySelector(".search-input").addEventListener("input", function() {
    let value = this.value;
    sorts(value);    
  });
  document.querySelector(".search-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        sorts(this.value);
        this.value = "";
      this.blur();
        document.querySelector(".search-div").classList.remove("show-search");
    }
});
  render();
  
   
  
  </script>
  <script>
  document.querySelector(".search-btn").onclick = function () {

    document.querySelector(".search-div").classList.add("show-search");
};

document.querySelector(".plus").onclick = function () {
    document.querySelector(".search-div").classList.remove("show-search");
};  
  </script>
</body>
</html>
