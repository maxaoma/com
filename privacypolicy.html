<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <link rel="icon" type="image/png" href="icon.webp">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:  
      radial-gradient(circle at top left, rgba(110,231,255,.14), transparent 24%),  
      radial-gradient(circle at top right, rgba(168,85,247,.12), transparent 28%),  
      linear-gradient(180deg, #040711 0%, #050816 100%);
    color:#fff;
    min-height: 100vh;
  display: flex;
  justify-content: center;
}

#content{
    max-width:700px;
    margin:30px auto;
}

.card{
    background:transparent;
    padding:20px;   
}

.card img{
    width:90px;
    height:90px;
    display:block;
    margin:0 auto 20px;
    border-radius:18px;
    border:2px solid #0ef;
    box-shadow:0 0 15px #0ef;
}

.card h2{
    text-align:center;
    margin-bottom:15px;
    color:#0ef;
}

.card p{
    line-height:1.7;
    white-space:pre-wrap;
}

#backBtn{
    position:fixed;
    left:2vw;
    bottom:10vh;
      width: 26vw;
    aspect-ratio: 22/5;
    background: rgba(55,155,157,.8);
    border: none;
    color: #fff;
}
    #backBtn:active {
        opacity: .5;
    }
  .footer{
    position: fixed;
    bottom: 0;
    text-align:center;
      background: rgba(0,0,0,1);
    color:#fff;
      height: 6vh;
    width: 100%;
    border-top: 1px solid #0ef;
}

.footer a{
    display:inline-block;
    margin:1% 2%;
    color:#0ef;
    text-decoration:none;
    font-weight:bold;
}

.footer a:hover{
    text-decoration:underline;
}

.footer p{
    margin-top:1%;
    color:#fff;
    font-size:13px;
}
     .show-page {
  position: fixed;
  width: 50px;
  height: 25px;
  inset: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
.show-page span, .left-page span{
  font-size: 35px;
  
}
.left-page {
  position: fixed;
  height: 100%;
  width: 300px;
  gap: 1%;
  background:  
      radial-gradient(circle at top left, rgba(110,231,255,.14), transparent 24%),  
      radial-gradient(circle at top right, rgba(168,85,247,.12), transparent 28%),  
      linear-gradient(180deg, #040711 0%, #050816 100%);
  left: -304px;
  z-index: 99;
  top: 0;
  transition: .5s;
  display: flex;
  border-right: 2px solid #0ef;
  flex-direction: column;
  align-items: fle-start;
  justify-content: flex-start;
}
.show-vis {
  left: 0;
} 
.itemp {
  margin-top: 5px;
  display: flex;
  flex-direction: row;
  justify-content: center;
  width: 100%;
  border-bottom: 2px solid #0ef;
  gap: 15px;
  align-items: center;
  text-transform: uppercase;
}
</style>

</head>
<body>

<div id="content"></div>
    <button id="backBtn">Back</button>
  <div class="footer">
    <a href="about.html?mode=about">About</a>
    <a href="about.html?mode=contact">Contact</a>
    <a href="about.html?mode=services">Services</a>

    <p>© 2026 maxaoma all rights reserved</p>
</div>
    
     <div class="show-page">
    <span class="material-symbols-outlined">
menu
</span>
  </div>
<div class="left-page">
    <div class="itemp" onclick="location.href = 'index.html'">
      <span class="material-symbols-outlined">
home
</span>
      <p>home</p>
    </div>
    
     <div class="itemp" onclick="location.href = 'apps.html'">
      <span class="material-symbols-outlined">
apps
</span>
       
      <p>apps</p>
    </div>
    
  </div>
<script type="module">
    let response = await fetch("apps.json");
let data = await response.json();
  let apps = data.apps;
const params = new URLSearchParams(window.location.search);

    

// Text only
const content = document.getElementById("content");
    
 const i = parseInt(params.get("id"));

if (i && !isNaN(i) && apps[i]) {
    const app = apps[i];
    const appPrivacy = app.privacypolicy;

    content.innerHTML = `
        <div class="card">
            <img src="${i}.webp" alt="Icon">
            <h2>Privacy Policy</h2>
            <p>${appPrivacy}</p>
        </div>
    `;
} else {
    content.innerHTML = `
        <div class="card">
            <h2>No Privacy Policy Found</h2>
        </div>
    `; 
}

    document.addEventListener("click", function(e) {
    const page = document.querySelector(".left-page");
    if (e.target.closest(".show-page")) {
        page.classList.add("show-vis");
    } else if (!e.target.closest(".left-page")) {
        page.classList.remove("show-vis");
    }
  }); 
document.getElementById("backBtn").addEventListener("click", () => {
    window.history.back();
});
</script>

</body>
</html>
