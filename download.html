<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download App</title>
<link rel="icon" type="image/png" href="maxtocantona.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  background: #081b29;
  padding: 30px;
  text-align: center;
  margin: 0;
  color: #fff;
}

h2 { margin: 10px 0; }

p {
  margin: 10px auto;
  max-width: 320px;
  line-height: 1.6;
}

.button {
  padding: 12px 25px;
  background: #0ef;
  color: #000;
  text-decoration: none;
  border-radius: 6px;
  font-size: 16px;
  margin-top: 15px;
  display: inline-block;
  font-weight: bold;
}

.photo-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

.photo-grid img {
  width: 100px;
  height: 100px;
  object-fit: fill;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid #0ef;
}

#overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 1000;
}

#overlay img {
  max-width: 95%;
  max-height: 80%;
  border-radius: 8px;
}

.close-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: #fff;
  color: #000;
  border-radius: 6px;
  cursor: pointer;
}

.nav {
  position: absolute;
  top: 50%;
  font-size: 40px;
  color: #fff;
  cursor: pointer;
  user-select: none;
}

.prev { left: 15px; }
.next { right: 15px; }

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #081b29;
  color: #fff;
  text-align: center;
  padding: 10px;
  font-size: 14px;
  border-top: 1px solid #0ef;
}
</style>
</head>

<body>

<script>
function fromHex(hex){
  try{
    return hex.match(/.{1,2}/g)
      .map(b => String.fromCharCode(parseInt(b,16)))
      .join('');
  }catch(e){ return ""; }
}

const params = new URLSearchParams(location.search);

const appFile = params.get("app");
const iconURL = params.get("png") || "default-icon.png";
const descHex = params.get("des") || "";
const photosParam = params.get("photos") || "[]";

const description = fromHex(descHex);

let photos = [];
try {
  photos = JSON.parse(decodeURIComponent(photosParam));
} catch(e){ photos = []; }

if(appFile && appFile.endsWith(".apk")){

  const appName = appFile
    .replace(".apk","")
    .replaceAll("_"," ")
    .replace(/\b\w/g,l=>l.toUpperCase());

  let photosHTML = "";

  if(photos.length){
    photosHTML = `<div class="photo-grid">` +
      photos.map((p,i)=>
        `<img src="${p}" data-i="${i}" onerror="this.src='default-icon.png'">`
      ).join("") +
    `</div>`;
  }

  document.body.innerHTML = `
    <div id="content">
      <img src="${iconURL}" style="width:96px;height:96px;border-radius:16px;border:2px solid #0ef;">
      <h2>${appName}</h2>
      <p>${description}</p>

      ${photosHTML}

      <a class="button" href="${appFile}" download>Download APK</a>
      <a class="button" href="details.html?app=${encodeURIComponent(appName)}">What is Coming</a>
      <a class="button" href="javascript:history.back()">Back</a>
    </div>

    <div id="overlay">
      <span class="nav prev">&#10094;</span>
      <img id="overlayImg">
      <span class="nav next">&#10095;</span>
      <div class="close-btn">Close</div>
    </div>

    <footer>
      &copy; 2026 maxtocantona. All rights reserved.
    </footer>
  `;

  const overlay = document.getElementById("overlay");
  const overlayImg = document.getElementById("overlayImg");
  const imgs = document.querySelectorAll(".photo-grid img");
  let index = 0;

  function show(i){
    index = i;
    overlayImg.src = photos[i];
    overlay.style.display = "flex";
  }

  imgs.forEach(img=>{
    img.onclick = ()=>show(parseInt(img.dataset.i));
  });

  document.querySelector(".close-btn").onclick = ()=>{
    overlay.style.display = "none";
  };

  document.querySelector(".prev").onclick = ()=>{
    index = (index - 1 + photos.length) % photos.length;
    overlayImg.src = photos[index];
  };

  document.querySelector(".next").onclick = ()=>{
    index = (index + 1) % photos.length;
    overlayImg.src = photos[index];
  };

}else{
  document.body.innerHTML = "<h2>App not found</h2>";
}
</script>

</body>
</html>
